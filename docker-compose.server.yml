# 服务器特定的部署 override，配合主 docker-compose.yml 使用：
#   docker compose -f docker-compose.yml -f docker-compose.server.yml up -d
# 作用：
# - Linux Docker 跑 Chromium reCAPTCHA broker 需要 Xvfb 起虚拟显示（mac 不需要）。
# - Celery threads pool 在 reCAPTCHA broker 场景下不稳，改 solo pool 一进程一任务避坑。
# - frontend 端口避开 mac 本地 dev 用的 3000，错峰到 13000。
services:
  worker_image:
    command:
      - "sh"
      - "-c"
      - "Xvfb :99 -screen 0 1280x1024x24 -nolisten tcp & export DISPLAY=:99; sleep 1; exec celery -A app.workers.celery_app worker -Q image -n image@%h --pool=solo -l info"

  worker_video:
    command:
      - "sh"
      - "-c"
      - "Xvfb :99 -screen 0 1280x1024x24 -nolisten tcp & export DISPLAY=:99; sleep 1; exec celery -A app.workers.celery_app worker -Q video -n video@%h --pool=solo -l info"

  # 极小 reCAPTCHA token broker：KleinAI(Go) 通过 HTTP 调它取 reCAPTCHA token。
  # 复用 backend/app/services/flow/recaptcha.py 的浏览器路径（Chrome CDP），
  # 不连 DB/Redis/MinIO，是 flow2api 大栈砍掉后唯一保留的 Python 服务。
  recaptcha-broker:
    build:
      context: ./backend
      dockerfile: Dockerfile.broker
    restart: unless-stopped
    environment:
      FLOW_HEADLESS: "true"
      FLOW_CHROME_PATH: /usr/bin/chromium
      FLOW_PROFILES_DIR: /tmp/flow_profiles
    ports:
      - "8900:8900"

  frontend:
    # !reset 让 override 替换主 compose 的 ports（默认是数组合并/追加，
    # 会同时绑 3000+13000，撞上 server 上其他 next-server）
    ports: !reset
      - "13000:3000"
